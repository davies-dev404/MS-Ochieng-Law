kind = "web"
previewPath = "/"
title = "M.S Ochieng Law - Brand Identity"
version = "1.0.0"
id = "artifacts/ms-ochieng-law"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20613

[services.development]
run = "pnpm --filter @workspace/ms-ochieng-law run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ms-ochieng-law", "run", "build" ]
publicDir = "artifacts/ms-ochieng-law/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20613"
BASE_PATH = "/"
